<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Polaris - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fafafa;
      padding: 24px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    
    .container {
      text-align: center;
      max-width: 320px;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      opacity: 0.6;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    
    p {
      color: #a0a0a0;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    
    button {
      background: #fafafa;
      color: #0a0a0a;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    button:active {
      transform: scale(0.97);
    }
    
    .star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="star" style="top: 10%; left: 15%; animation-delay: 0s;"></div>
  <div class="star" style="top: 20%; left: 80%; animation-delay: 0.5s;"></div>
  <div class="star" style="top: 60%; left: 10%; animation-delay: 1s;"></div>
  <div class="star" style="top: 75%; left: 70%; animation-delay: 1.5s;"></div>
  <div class="star" style="top: 40%; left: 90%; animation-delay: 2s;"></div>
  
  <div class="container">
    <svg class="icon" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="256" cy="256" r="200" stroke="#fafafa" stroke-width="24" stroke-dasharray="40 20"/>
      <circle cx="256" cy="256" r="8" fill="#fafafa"/>
      <line x1="256" y1="256" x2="256" y2="120" stroke="#fafafa" stroke-width="16" stroke-linecap="round"/>
    </svg>
    
    <h1>You're Offline</h1>
    <p>No worries—your focus stays with you. Reconnect when you're ready to sync.</p>
    
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
