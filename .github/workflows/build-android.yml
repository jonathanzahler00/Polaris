# Builds the Capacitor Android shell (PWA), not android-widget/.
# Release artifact is the primary distribution build; debug is optional QA.
name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create web assets directory
        run: mkdir -p out && cp out/index.html out/index.html 2>/dev/null || echo '<!DOCTYPE html><html><body>Loading...</body></html>' > out/index.html

      - name: Sync Capacitor
        run: npx cap sync android

      # Release first — this is what you ship / attach to GitHub Releases
      - name: Build release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload release APK (primary artifact)
        uses: actions/upload-artifact@v4
        with:
          name: polaris-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Build debug APK (optional QA)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: polaris-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
